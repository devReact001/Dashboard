<div class="grid-container">

  <!-- item1: Sidebar — col 1-3, row 1-13 (full height) -->
  <div class="item1">
    <app-sidebar></app-sidebar>
  </div>

  <!-- item2: Stat Cards — col 3-9, row 1-5 -->
  <div class="item2">
    <app-cards [stats]="stats"></app-cards>
  </div>

  <!-- item4: Area Chart — col 9-13, row 1-5 -->
  <div class="item4 card">
    <h4>Area Chart</h4>
    <app-area-chart></app-area-chart>
  </div>

  <!-- item3: Candidates Table — col 3-9, row 5-9 -->
  <div class="item3 card">
    <h4>Candidates</h4>
    <app-pagination-table></app-pagination-table>
  </div>

  <!-- item6: Line Chart — col 9-13, row 5-9 -->
  <div class="item6 card">
    <h4>Line Chart (Sensor)</h4>
    <app-line-chart></app-line-chart>
  </div>

  <!-- item7: Bar Chart — col 9-13, row 9-13 -->
  <div class="item7 card">
    <h4>Bar Chart</h4>
    <app-bar-chart></app-bar-chart>
  </div>

  <!-- item8: Doughnut Chart — col 3-6, row 9-13 -->
  <div class="item8 card">
    <h4>Doughnut Chart</h4>
    <app-doughnut-chart></app-doughnut-chart>
  </div>

  <!-- item9: Pie Chart — col 6-9, row 9-13 -->
  <div class="item9 card">
    <h4>Pie Chart</h4>
    <app-pie-chart></app-pie-chart>
  </div>

</div>
