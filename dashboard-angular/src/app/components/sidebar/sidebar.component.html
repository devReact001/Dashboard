<div class="sidebar-card">
  <!-- Welcome -->
  <div class="sidebar-block welcome-block">
    <div class="block-label">Welcome User</div>
    <div class="username">{{ user?.name ?? '—' }}</div>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- Date & Time -->
  <div class="sidebar-block datetime-block">
    <div class="block-label">Date &amp; Time</div>
    <div class="datetime-value">{{ currentDate | date:'shortTime' }}</div>
    <div class="datetime-date">{{ currentDate | date:'mediumDate' }}</div>
  </div>

  <!-- Notifications -->
  <div class="sidebar-block notif-block">
    <div class="block-label">Notifications</div>
    <div class="notif-list">
      <ul>
        <li *ngFor="let n of notifications">{{ n.message }}</li>
        <li *ngIf="notifications.length === 0" class="empty">No notifications</li>
      </ul>
    </div>
  </div>
</div>
