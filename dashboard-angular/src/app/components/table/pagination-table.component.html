<div class="table-wrapper">
  <div *ngIf="loading" class="loading">Loading candidates…</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && !error">
    <thead>
      <tr>
        <th *ngFor="let col of columns">{{ col.Header }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of data">
        <td *ngFor="let col of columns">{{ row[col.accessor] }}</td>
      </tr>
    </tbody>
  </table>

  <div class="pagination" *ngIf="!loading && data.length > 0">
    <button (click)="goToPage(page - 1)" [disabled]="page === 1">&lsaquo;</button>
    <button
      *ngFor="let p of pages"
      (click)="goToPage(p)"
      [class.active]="p === page"
    >{{ p }}</button>
    <button (click)="goToPage(page + 1)" [disabled]="page === totalPages">&rsaquo;</button>
  </div>
</div>
